<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { margin: 0; font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1e293b; display:flex; justify-content:center; align-items:center; min-height:100vh; }
      .login-card { width: 360px; background: white; border-radius: 24px; box-shadow: 0 30px 60px rgba(15,23,42,0.08); padding: 36px; }
      .login-card h1 { margin: 0 0 10px; font-size: 28px; }
      .login-card p { margin: 0 0 24px; color: #475569; line-height:1.6; }
      .field { display:flex; flex-direction:column; gap: 8px; margin-bottom: 18px; }
      .field label { font-size: 14px; font-weight:600; color:#334155; }
      .field input { width:100%; min-height:44px; padding:12px 14px; border:1px solid #e2e8f0; border-radius: 14px; font-size:14px; }
      .button { display:inline-flex; align-items:center; justify-content:center; background:#2563eb; color:white; font-weight:700; border:none; border-radius:999px; padding:12px 20px; cursor:pointer; width:100%; box-shadow:0 16px 30px rgba(37,99,235,0.18); }
      .button:hover { background:#1d4ed8; }
      .secondary-button { display:inline-flex; align-items:center; justify-content:center; background:#e2e8f0; color:#1f2937; font-weight:700; border:none; border-radius:999px; padding:12px 20px; cursor:pointer; width:100%; margin-top:12px; }
      .secondary-button:hover { background:#cbd5e1; }
      .footer { margin-top: 22px; font-size:13px; color:#94a3b8; text-align:center; }
      .error { color:#b91c1c; font-size:13px; min-height:18px; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>Login Marketing Hub</h1>
      <p>Masuk menggunakan email yang terdaftar di Master User.</p>
      <div class="field">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" placeholder="nama@contoh.com" autofocus>
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" placeholder="••••••••">
      </div>
      <div class="error" id="loginError"></div>
      <button class="button" type="button" onclick="doLogin()">Masuk</button>
      <button class="secondary-button" type="button" onclick="doReinitializeMasterUser()">Reinitialize Master User Sheet</button>
      <div class="footer">Jika belum terdaftar, hubungi administrator.</div>
    </div>

    <script>
      function doLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorEl = document.getElementById('loginError');
        errorEl.textContent = '';
        if (!email || !password) {
          errorEl.textContent = 'Email dan password wajib diisi.';
          return;
        }

        google.script.run.withSuccessHandler(handleLoginResult).loginUser(email, password);
      }

      function handleLoginResult(response) {
        if (!response.success) {
          document.getElementById('loginError').textContent = response.error || 'Login gagal.';
          return;
        }
        google.script.run.withSuccessHandler(renderMainApp).getAppPage(response.user);
      }

      function doReinitializeMasterUser() {
        document.getElementById('loginError').textContent = '';
        google.script.run.withSuccessHandler(handleReinitializeResult).reinitializeMasterUserSheet();
      }

      function handleReinitializeResult(response) {
        document.getElementById('loginError').textContent = response.success ? response.message : (response.error || 'Reinitialize gagal.');
      }

      function renderMainApp(html) {
        document.open();
        document.write(html);
        document.close();
      }
    </script>
  </body>
</html>
